name: halo_l1_spice_baseline

scenario:
  name: halo_l1_spice
  params:
    mu: 0.0121505856
    epoch: "2026 APR 10 00:00:00 TDB"
    duration_days: 6.5
    correction_at_days: 2.5
    dt_meas_min: 30.0
    kernels:
      - data/kernels/naif0012.tls
      - data/kernels/de442s.bsp

sensor:
  name: camera_bearing
  params:
    target_body: Moon
    fx: 400.0
    fy: 400.0
    cx: 320.0
    cy: 240.0
    width: 640
    height: 480
    sigma_px: 1.5
    dropout_p: 0.0
    pointing: estimate_tracking

estimator:
  name: iekf
  # SPICE units → q_acc has units km²/s³. Pick equivalent of CR3BP q_acc=1e-9
  # (dimensionless), scaled by lunit²/tunit³ ≈ 4e-7 m²/s⁵ ≈ 4e-13 km²/s⁵ ...
  # but EKF wants white-noise spectral density in km²/s³, so use a tuned value.
  params:
    q_acc: 1.0e-12
    rtol: 1.0e-10
    atol: 1.0e-12
    max_iterations: 3
    gating_enabled: false

guidance:
  name: single_impulse
  params:
    max_iter: 10
    tol: 1.0e-10

trial:
  seed: 7
  sigma_r_inj: 1.0e-4
  sigma_v_inj: 0.0
  sigma_r_est: 1.0e-4
  sigma_v_est: 0.0
  planar_only: true

output:
  out_dir: results/cisopt
  save_debug: true
