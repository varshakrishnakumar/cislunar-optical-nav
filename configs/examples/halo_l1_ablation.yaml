# Ablation sweep mirroring the brief's Item 3:
#   - passive vs active pointing
#   - low vs high process noise
#   - low vs high pixel noise
# Run: python run_ablation.py configs/examples/halo_l1_ablation.yaml

n_trials_per_combo: 8
base_seed: 7

axes:
  sensor.params.pointing: [fixed, estimate_tracking]
  estimator.params.q_acc: [1.0e-11, 1.0e-9, 1.0e-7]
  sensor.params.sigma_px: [0.5, 1.5, 3.0]

base:
  name: halo_l1_ablation
  scenario:
    name: halo_l1_cr3bp
    params:
      mu: 0.0121505856
      t0_s: 0.0
      tf_s: 6.0
      tc_s: 2.0
      dt_meas_s: 0.02
  sensor:
    name: camera_bearing
    params:
      target_body: Moon
      fx: 400.0
      fy: 400.0
      cx: 320.0
      cy: 240.0
      width: 640
      height: 480
      sigma_px: 1.5
      dropout_p: 0.0
      pointing: estimate_tracking
  estimator:
    name: iekf
    params:
      q_acc: 1.0e-9
      rtol: 1.0e-10
      atol: 1.0e-12
      max_iterations: 3
      gating_enabled: false
  guidance:
    name: single_impulse
    params:
      max_iter: 10
      tol: 1.0e-10
  trial:
    seed: 7
    sigma_r_inj: 1.0e-4
    sigma_v_inj: 0.0
    sigma_r_est: 1.0e-4
    sigma_v_est: 0.0
    planar_only: true
  output:
    out_dir: results/cisopt
    save_debug: false
